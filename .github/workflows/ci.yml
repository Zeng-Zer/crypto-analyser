name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - run: uv sync --locked
      - run: uv run playwright install --with-deps chromium
      - run: uv run ruff check src tests
      - run: uv run python -m compileall -q src tests
      - run: uv build
      - run: docker compose up -d --wait pgvector
      - run: |
          uv run crypto-analyser news init
          uv run crypto-analyser news init
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/crypto
      - run: uv run pytest -q
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/crypto
