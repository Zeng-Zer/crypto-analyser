[project]
name = "crypto-analyser"
version = "0.1.0"
description = "Historical crypto anomaly detection using derivatives market structure (funding rates, open interest)"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "duckdb>=1.1",
    "pyarrow>=18.0",
    "pandas>=2.2",
    "requests>=2.32",
    "pyyaml>=6.0",
    "psycopg2-binary>=2.9",
    "langfuse>=2.0",
]

[tool.setuptools.packages.find]
where = ["src"]

[project.optional-dependencies]
dev = [
    "ruff>=0.8",
    "mypy>=1.13",
]

[tool.ruff]
target-version = "py312"
line-length = 120

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W"]

[tool.mypy]
python_version = "3.12"
strict = true
