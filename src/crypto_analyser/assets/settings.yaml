# Non-secret defaults. API keys and database credentials come from environment.

sources:
  binance:
    base_url: "https://data.binance.vision"
    intervals:
      ohlcv: "5m"

anomaly_detection:
  window_hours: 24
  threshold: 2.5
  min_consecutive: 2
  derivatives_thresholds:
    funding_rate_mag: 0.0005
    oi_change_4h: 0.10

paths:
  ohlcv_dir: "data/ohlcv"
  funding_dir: "data/funding"
  oi_dir: "data/oi"
  anomalies_dir: "data/anomalies"

llm:
  model: "glm-5.2-short-flex"

langfuse:
  host: null
  public_key: null
  secret_key: null