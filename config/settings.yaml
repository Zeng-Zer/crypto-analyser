# Crypto Analyser Configuration
# Non-secret, version-controlled config. Secrets (LLM_API_URL, LLM_API_KEY,
# database passwords, Langfuse keys) live in .env (gitignored). See .env.example.

# ─── API Keys ───
# Only non-secret public endpoints belong here. Real secrets come from .env
# at point of use (e.g., crypto_analyser.llm_client reads LLM_API_URL / 
# LLM_API_KEY directly via os.getenv).
api_keys:
  # Wayback machine CDX API (public, no key required)
  wayback_api_url: "https://web.archive.org/cdx/search/cdx"

# ─── Data Sources ───
sources:
  binance:
    base_url: "https://data.binance.vision"
    symbol: "LUNAUSDT"
    intervals:
      ohlcv: "5m"     # 5-minute klines
      funding: "8h"   # 8-hour funding rate
    directories:
      ohlcv: "data/futures/um/monthly/klines"
      funding: "data/futures/um/monthly/fundingRate"
      open_interest: "data/futures/um/daily/metrics"

  wayback:
    base_url: "https://web.archive.org"
    cdx_url: "https://web.archive.org/cdx/search/cdx"

# ─── Z-Score + Derivatives Thresholds ───
anomaly_detection:
  # Rolling window for Z-score calculation
  window_hours: 24
  # Z-score threshold for flagging anomalies
  #   2.0  → ~95% of normal distribution
  #   2.5  → ~99% of normal distribution (default)
  #   3.0  → ~99.7% of normal distribution
  threshold: 2.5
  # Minimum consecutive anomalies to trigger an event
  min_consecutive: 2
  # Derivatives "explained" rule — injected into the Task 17 system prompt
  # as a rubric the LLM applies itself. See ADR-0003 (rule as prompt
  # rubric, not deterministic Task 18 default).
  #   funding_rate_mag : |funding_rate_current| above this = unusual funding
  #   oi_change_4h     : |oi_change_4h| above this in a 4h window = unusual OI move
  derivatives_thresholds:
    funding_rate_mag: 0.0005
    oi_change_4h: 0.10

# ─── RSS Feeds (verified via Task 0.2) ───
rss_feeds:
  - name: "CoinDesk"
    url: "https://www.coindesk.com/arc/outboundfeeds/rss/"
  - name: "CoinTelegraph"
    url: "https://cointelegraph.com/rss"
  - name: "Decrypt"
    url: "https://decrypt.co/feed"

# ─── Validation Event Windows ───
events:
  luna:
    symbol: "LUNAUSDT"
    window:
      start: "2022-05-07T00:00:00Z"
      end: "2022-05-11T23:59:59Z"
    description: "LUNA pre-crash validation window (delisted May 12)"
  ftx:
    symbol: "BTCUSDT"
    window:
      start: "2022-11-06T00:00:00Z"
      end: "2022-11-12T23:59:59Z"
    description: "FTX collapse (enrichment)"
  bybit:
    symbol: "BTCUSDT"
    window:
      start: "2025-02-21T00:00:00Z"
      end: "2025-02-22T23:59:59Z"
    description: "Bybit hack (enrichment)"

# ─── Paths ───
paths:
  data_dir: "data"
  reports_dir: "data/reports"
  raw_dir: "data/raw"
  ohlcv_dir: "data/ohlcv"
  funding_dir: "data/funding"
  oi_dir: "data/oi"
  anomalies_dir: "data/anomalies"
  context_dir: "data/context"
  classifications_dir: "data/classifications"

# ─── pgvector ───
pgvector:
  host: "host"
  port: "port"
  db: "dbname"
  user: "user"
  password: "password"
  # Embedding dimension (qwen3-embedding = 4096)
  embedding_dimension: 4096

# ─── LLM Classifier ───
# Note: the classification JSON schema lives in schemas/classification.json
# and is loaded by LLMClient._load_schema(). It is NOT declared here. The
# orphaned `output_schema` block that used to live here was deleted as dead
# config (ADR-0002).
llm:
  model: "glm-5.2-short-flex"
  temperature: 0.1
  max_tokens: 2000

# ─── Langfuse Observability ───
langfuse:
  host: "http://localhost:3000"
  public_key: "cle-temporaire-123"
  secret_key: "s_key"

# ─── Ragas Evaluation ───
ragas:
  metrics:
    - "faithfulness"
    - "answer_relevancy"
